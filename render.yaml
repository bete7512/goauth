databases:
  - name: goauth-db
    plan: free
    databaseName: goauth
    user: goauth

services:
  # Go backend API
  - type: web
    name: goauth-api
    runtime: docker
    dockerfilePath: ./demo/backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goauth-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: API_URL
        fromService:
          name: goauth-api
          type: web
          property: hostport
      - key: FRONTEND_URL
        fromService:
          name: goauth-demo
          type: web
          property: hostport
      - key: PORT
        value: "8080"
      # Optional: set these in Render dashboard to enable features
      # - key: RESEND_API_KEY
      # - key: GOOGLE_CLIENT_ID
      # - key: GOOGLE_CLIENT_SECRET
      # - key: GITHUB_CLIENT_ID
      # - key: GITHUB_CLIENT_SECRET

  # Next.js frontend
  - type: web
    name: goauth-demo
    runtime: docker
    dockerfilePath: ./demo/Dockerfile
    dockerContext: ./demo
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: goauth-api
          type: web
          property: hostport
      - key: NEXT_PUBLIC_API_BASE_PATH
        value: "/api/v1"
